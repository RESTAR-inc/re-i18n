version: 2

updates:
  - package-ecosystem: "github-actions"
    open-pull-requests-limit: 1
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      # sync this with min-release-age in .npmrc
      default-days: 7
  - package-ecosystem: "npm"
    directory: "/example"
    schedule:
      interval: "monthly"
    cooldown:
      # sync this with min-release-age in .npmrc
      default-days: 7
